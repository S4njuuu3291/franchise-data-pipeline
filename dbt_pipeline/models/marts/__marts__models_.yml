version: 2

models:
  - name: fact_order_items
    description: "Fact table — grain per item_id, hasil JOIN stg_orders & stg_order_items"
    columns:
      - name: item_id
        description: "Primary key item"
        tests:
          - unique:
              config:
                where: "concat(year, '-', month, '-', day) >= CAST(CURRENT_DATE - INTERVAL '3' DAY AS VARCHAR)"
          - not_null:
              config:
                where: "concat(year, '-', month, '-', day) >= CAST(CURRENT_DATE - INTERVAL '3' DAY AS VARCHAR)"
      - name: order_id
        description: "Foreign key ke orders"
      - name: menu_id
        description: "Foreign key ke dim_menu (INT vs VARCHAR — skip relationships test)"
      - name: quantity
        description: "Jumlah item dipesan"
      - name: price_per_item
        description: "Harga per item saat transaksi"
      - name: subtotal
        description: "Subtotal (quantity * price_per_item)"
      - name: outlet_id
        description: "Foreign key ke dim_outlet (INT vs VARCHAR — skip relationships test)"
      - name: cashier_id
        description: "ID kasir"
      - name: total_amount
        description: "Total nilai pesanan"
      - name: payment_method
        description: "Metode pembayaran"
      - name: order_date
        description: "Foreign key ke dim_date"
        tests:
          - relationships:
              to: ref('dim_date')
              field: date
      - name: created_at
        description: "Timestamp order dibuat"
      - name: year
        description: "Partisi tahun"
      - name: month
        description: "Partisi bulan"
      - name: day
        description: "Partisi hari"

  - name: dim_menu
    description: "Dimension menu — SCD Type 2 dari snp_menu_master dengan enrichment (category_group, price_segment, promo_status)"
    columns:
      - name: menu_id
        description: "Primary key menu — SCD Type 2, tidak unique sendiri"
        tests:
          - not_null
      - name: menu_name
        description: "Nama menu/produk"
      - name: category
        description: "Kategori menu original"
      - name: category_group
        description: "Group kategori (Makanan/Minuman/Lainnya)"
      - name: base_price
        description: "Harga dasar menu"
      - name: price_tier_1
        description: "Harga tier 1"
      - name: price_tier_2
        description: "Harga tier 2"
      - name: price_tier_3
        description: "Harga tier 3"
      - name: price_segment
        description: "Segmentasi harga (Value/Core/Signature)"
      - name: promo_status
        description: "Status promo (Active/Inactive)"
      - name: updated_at
        description: "Timestamp diupdate"
      - name: row_start_date
        description: "SCD Type 2 — mulai berlaku"
      - name: row_end_date
        description: "SCD Type 2 — akhir berlaku (NULL = masih aktif)"
      - name: is_current_active
        description: "Flag apakah record ini yang aktif sekarang"

  - name: dim_date
    description: "Dimension date — kalender untuk analisis time-based (2025-2026)"
    columns:
      - name: date
        description: "Tanggal"
        tests:
          - unique
          - not_null
      - name: year
        description: "Tahun"
      - name: month
        description: "Bulan (1-12)"
      - name: day
        description: "Hari (1-31)"
      - name: quarter
        description: "Kuartal (1-4)"
      - name: week_of_year
        description: "Minggu ke- dalam tahun"
      - name: day_of_week
        description: "Hari ke- dalam minggu (1=Monday)"
      - name: day_name
        description: "Nama hari (Monday-Sunday)"
      - name: month_name
        description: "Nama bulan (January-December)"
      - name: is_weekend
        description: "Weekend/Weekday"
      - name: year_month
        description: "Tahun-Bulan (YYYY-MM)"

  - name: dim_outlet
    description: "Dimension outlet — SCD Type 2 dari snp_outlet_master dengan enrichment region_label"
    columns:
      - name: outlet_id
        description: "Primary key outlet — SCD Type 2, tidak unique sendiri"
        tests:
          - not_null
      - name: outlet_name
        description: "Nama outlet/cabang"
      - name: city
        description: "Kota lokasi outlet"
      - name: region_tier
        description: "Tier region (1/2/3)"
      - name: region_label
        description: "Label region (Prime/Secondary/Tier 3)"
      - name: created_at
        description: "Timestamp dibuat"
      - name: updated_at
        description: "Timestamp diupdate"
      - name: row_start_date
        description: "SCD Type 2 — mulai berlaku"
      - name: row_end_date
        description: "SCD Type 2 — akhir berlaku (NULL = masih aktif)"
      - name: is_current_active
        description: "Flag apakah record ini yang aktif sekarang"
